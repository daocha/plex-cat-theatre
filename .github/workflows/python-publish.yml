# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify PyPI version
        run: |
          python -m pip install setuptools-scm
          VERSION="$(python -m setuptools_scm)"
          echo "Derived version: $VERSION"
          if [[ "$VERSION" == *".dev"* ]]; then
            echo "PyPI publishing does not allow .dev versions." >&2
            exit 1
          fi

      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest build twine setuptools-scm
          python -m pip install -e .
          pytest

      - name: Build release distributions
        run: |
          python -m build

      - name: Validate distributions
        run: |
          python -m twine check dist/*
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          required = {
              "cat_theatre_assets/index.html",
              "cat_theatre_assets/movies.css",
              "cat_theatre_assets/movies.js",
              "cat_theatre_assets/movies.min.js",
              "cat_theatre_assets/plex.svg",
              "cat_theatre_assets/movies_config.sample.json",
          }

          with ZipFile(wheel) as zf:
              names = set(zf.namelist())

          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"Wheel is missing required assets: {missing}")
          PY

      - name: Smoke test installed package
        run: |
          python -m venv /tmp/plex-cat-theatre-smoke
          /tmp/plex-cat-theatre-smoke/bin/pip install --upgrade pip
          /tmp/plex-cat-theatre-smoke/bin/pip install dist/*.whl
          /tmp/plex-cat-theatre-smoke/bin/plex-cat-theatre-init --help
          /tmp/plex-cat-theatre-smoke/bin/plex-cat-theatre --help
          /tmp/plex-cat-theatre-smoke/bin/plex-cat-theatre-passcode --help
          mkdir -p /tmp/plex-cat-theatre-smoke-home
          /tmp/plex-cat-theatre-smoke/bin/plex-cat-theatre-init \
            --config /tmp/plex-cat-theatre-smoke-home/movies_config.json \
            --force
          test -f /tmp/plex-cat-theatre-smoke-home/movies_config.json

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      # OPTIONAL: uncomment and update to include your PyPI project URL in the deployment status:
      # url: https://pypi.org/p/YOURPROJECT
      #
      # ALTERNATIVE: if your GitHub Release name is the PyPI project version string
      # ALTERNATIVE: exactly, uncomment the following line instead:
      # url: https://pypi.org/project/YOURPROJECT/${{ github.event.release.name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
